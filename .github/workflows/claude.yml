name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
            
      - name: Install python tools
        run: |
          uv sync

      - name: Create command wrappers
        run: |
          mkdir -p ~/.local/bin
          echo '#!/usr/bin/env bash' > ~/.local/bin/noctua
          echo 'uv run noctua "$@"' >> ~/.local/bin/noctua
          chmod +x ~/.local/bin/noctua
      
          echo '#!/usr/bin/env bash' > ~/.local/bin/barista
          echo 'uv run noctua barista "$@"' >> ~/.local/bin/barista
          chmod +x ~/.local/bin/barista
      
          echo "~/.local/bin" >> $GITHUB_PATH

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          BARISTA_TOKEN: ${{ secrets.BARISTA_TOKEN }}
        
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
          
          claude_args: |
            --permission-mode bypassPermissions


